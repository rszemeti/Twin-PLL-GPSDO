name: Release Artifacts

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to use for artifact naming and release upload (example: v0.6.1)"
        required: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-firmware-uf2:
    name: Build firmware UF2
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.release_tag }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: python -m pip install --upgrade pip platformio

      - name: Build firmware
        working-directory: firmware
        env:
          PLATFORMIO_BUILD_FLAGS: -D FW_VERSION_STRING=\"${{ env.RELEASE_TAG }}\"
        run: python -m platformio run

      - name: Stage UF2 artifact
        run: |
          mkdir -p release-assets
          cp firmware/.pio/build/pico2/firmware.uf2 release-assets/Twin-PLL-GPSDO-${RELEASE_TAG}.uf2

      - name: Upload UF2 artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: firmware-uf2
          path: release-assets/*.uf2
          if-no-files-found: error

  build-monitor-exe:
    name: Build monitor one-file EXE
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.release_tag }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.11'

      - name: Install monitor dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r monitor/requirements.txt
          python -m pip install pyinstaller

      - name: Inject monitor build version
        shell: pwsh
        run: |
          Set-Content -Path "monitor/monitor_version.py" -Value "VERSION = '$env:RELEASE_TAG'"

      - name: Build one-file EXE
        run: |
          pyinstaller --clean --onefile --name TwinPLLGPSDOMonitor monitor/gpsdo_monitor.py

      - name: Stage EXE artifact
        shell: pwsh
        run: |
          $tag = "$env:RELEASE_TAG" -replace '[^a-zA-Z0-9._-]', '_'
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Copy-Item "dist/TwinPLLGPSDOMonitor.exe" "release-assets/TwinPLLGPSDOMonitor-$tag.exe"

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v7.0.0
        with:
          name: monitor-exe
          path: release-assets/*.exe
          if-no-files-found: error

  upload-release-assets:
    name: Attach assets to release
    runs-on: ubuntu-latest
    needs: [build-firmware-uf2, build-monitor-exe]
    env:
      RELEASE_TAG: ${{ github.event_name == 'release' && github.event.release.tag_name || github.event.inputs.release_tag }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: release-assets

      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release create "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --title "$RELEASE_TAG" --notes ""
          fi

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -t assets < <(find release-assets -type f \( -name '*.uf2' -o -name '*.exe' \))
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No release assets found (.uf2/.exe)."
            exit 1
          fi
          gh release upload "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --clobber "${assets[@]}"
